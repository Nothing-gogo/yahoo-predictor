<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇摩出獎預測系統 V3.8</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #6f42c1; --secondary: #e83e8c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); margin: 0 0 15px 0; text-align: center; font-size: 1.8em; }
        .status-bar { background: #fff3cd; padding: 10px; border-radius: 5px; text-align: center; font-size: 0.95em; margin-bottom: 15px; border: 1px solid #ffeeba; color: #856404; font-weight: bold; }
        .top-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 15px; margin-bottom: 20px; }
        .session-box { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 5px solid var(--primary); }
        .prediction-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { background: #fff; border: 1px solid #eee; border-top: 4px solid var(--secondary); padding: 10px; text-align: center; border-radius: 6px; }
        .time-label { font-size: 0.75em; color: #777; }
        .time-display { font-size: 1.6em; font-weight: bold; color: var(--secondary); }
        .table-wrapper { max-height: 180px; overflow-y: auto; border: 1px solid #eee; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { background: var(--primary); color: white; position: sticky; top: 0; padding: 8px; }
        td { padding: 6px; text-align: center; border-bottom: 1px solid #eee; }
        .chart-container { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px; height: 40vh; min-height: 300px; max-height: 400px; position: relative; }
        select { width: 100%; padding: 10px; margin-top: 10px; border-radius: 4px; border: 1px solid var(--primary); font-size: 1em; }
    </style>
</head>
<body>

<div class="container">
    <h1>奇摩出獎預測分析 V3.8</h1>
    <div id="status" class="status-bar">📝最後更新時間：正在聯繫 Google 表格...</div>

    <div class="top-grid">
        <div class="session-box">
            <label><strong>切換活動檔期：</strong></label>
            <select id="session-selector" onchange="switchSession()"></select>
            <div id="session-detail" style="margin-top:12px; font-size:0.85em; color:#444; line-height:1.6;"></div>
        </div>
        <div class="prediction-grid" id="prediction-results"></div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead><tr><th>日期</th><th>出獎時間</th><th>檔期</th></tr></thead>
            <tbody id="data-table"></tbody>
        </table>
    </div>

    <div class="chart-container">
        <canvas id="trendChart"></canvas>
    </div>
</div>

<script>
    // 自動修正網址：若使用者貼入 pubhtml，自動轉為 output=csv
    let rawUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS78ynlSp6RiZrbuy2xrepY_o8okgD2XygL6MqXTxpdY1crYWb4YemjrEdMUDfapv11FU0oiPaNWSKB/pubhtml';
    const CSV_URL = rawUrl.replace('/pubhtml', '/pub?output=csv');

    const sessionMeta = {
        "春日禮": {
            name: "【春日禮❤️可抽5次】麥當勞、必勝客、City Cafe等多重驚喜",
            range: "3/4~3/31",
            startFull: "2026-03-04 16:00:00",
            endFull: "2026-03-31 23:59:59",
            link: "https://tw.yahoo.com/member/item/266443",
            history: "https://tw.yahoo.com/member/luckyDrawHistory/93206"
        }
    };

    let fullData = [];
    let currentSession = "";
    let trendChart = null;

    async function init() {
        try {
            const response = await fetch(CSV_URL + '&t=' + new Date().getTime());
            const text = await response.text();
            
            // 讀取每一列並過濾空白
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
            
            fullData = lines.slice(1).map(line => {
                const cols = line.split(',');
                return { 
                    session: cols[0]?.replace(/"/g, '').trim(), 
                    date: cols[1]?.replace(/"/g, '').trim(), 
                    time: parseInt(cols[2]),
                    sheetTime: cols[3]?.replace(/"/g, '').trim() // 抓取 D 欄 (索引 3)
                };
            }).filter(d => !isNaN(d.time));

            // --- 強化：找出所有資料中最後一個非空白的 D 欄內容 ---
            let finalUpdate = "無有效數據";
            for (let i = fullData.length - 1; i >= 0; i--) {
                if (fullData[i].sheetTime && fullData[i].sheetTime.length > 5) {
                    finalUpdate = fullData[i].sheetTime;
                    break;
                }
            }
            document.getElementById('status').innerText = `📝最後更新時間：${finalUpdate}`;

            const sessions = [...new Set(fullData.map(d => d.session))];
            currentSession = sessions[sessions.length - 1]; 

            const selector = document.getElementById('session-selector');
            selector.innerHTML = sessions.map(s => {
                const range = sessionMeta[s]?.range || "";
                return `<option value="${s}" ${s === currentSession ? 'selected' : ''}>${s}${range}</option>`;
            }).join('');

            updateDashboard();
        } catch (e) {
            document.getElementById('status').innerText = "❌ 讀取失敗。請確認試算表已「發布為 CSV」。";
            console.error(e);
        }
    }

    function updateDashboard() {
        const filtered = fullData.filter(d => d.session === currentSession);
        if (filtered.length === 0) return;

        const meta = sessionMeta[currentSession] || { name: currentSession, startFull: "-", link: "#", history: "#" };
        document.getElementById('session-detail').innerHTML = `
            <strong>活動名稱：</strong> ${meta.name}<br>
            <strong>開始時間：</strong> ${meta.startFull}<br>
            <strong>快速連結：</strong> <a href="${meta.link}" target="_blank">抽獎頁</a> | <a href="${meta.history}" target="_blank">紀錄</a>
        `;

        const last = filtered[filtered.length - 1].time;
        const prev = filtered[filtered.length - 2]?.time || last;
        const avg = Math.round(filtered.reduce((a,b)=>a+b.time,0)/filtered.length);
        const trend = Math.max(10, Math.min(23, last + (last - prev)));

        document.getElementById('prediction-results').innerHTML = `
            <div class="card"><div class="time-label">趨勢預測</div><div class="time-display">${trend}:00</div></div>
            <div class="card"><div class="time-label">平均參考</div><div class="time-display">${avg}:00</div></div>
            <div class="card"><div class="time-label">慣性推薦</div><div class="time-display">20:00</div></div>
        `;

        document.getElementById('data-table').innerHTML = filtered.slice().reverse().map(d => `
            <tr><td>${d.date}</td><td>${d.time} 點</td><td>${d.session}</td></tr>
        `).join('');

        renderChart(filtered);
    }

    function renderChart(data) {
        const ctx = document.getElementById('trendChart').getContext('2d');
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(d => d.date),
                datasets: [{
                    label: '點數',
                    data: data.map(d => d.time),
                    borderColor: '#6f42c1',
                    borderWidth: 2,
                    tension: 0.2,
                    fill: false,
                    pointRadius: 4,
                    pointBackgroundColor: '#e83e8c'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { min: 8, max: 24, ticks: { stepSize: 4 } } },
                plugins: { legend: { display: false } }
            }
        });
    }

    function switchSession() {
        currentSession = document.getElementById('session-selector').value;
        updateDashboard();
    }

    init();
</script>
</body>
</html>
