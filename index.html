<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇摩出獎預測系統 V3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #6f42c1; --secondary: #e83e8c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: #333; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .container { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1, h2 { color: var(--primary); text-align: center; }
        
        /* 檔期資訊卡 */
        .session-info { background: #f1f0ff; border-left: 5px solid var(--primary); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9em; }
        .session-info a { color: var(--secondary); text-decoration: none; font-weight: bold; }
        
        .status-bar { background: #fff3cd; padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 0.85em; text-align: center; border: 1px solid #ffeeba; }
        
        /* 預測卡片 */
        .prediction-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: #fff; border: 1px solid #eee; border-top: 5px solid var(--primary); padding: 20px; border-radius: 8px; text-align: center; }
        .time-display { font-size: 2.2em; font-weight: bold; color: var(--secondary); margin: 10px 0; }
        
        /* 表格與圖表 */
        .data-section { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .table-wrapper { max-height: 300px; overflow-y: auto; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th { background: var(--primary); color: white; position: sticky; top: 0; padding: 10px; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #eee; }
        
        .chart-container { margin-top: 30px; padding: 20px; background: #fff; border-radius: 10px; border: 1px solid #eee; }
        
        select { padding: 8px; border-radius: 5px; border: 1px solid var(--primary); margin-bottom: 10px; width: 200px; }
    </style>
</head>
<body>

<div class="container">
    <h1>奇摩出獎預測系統 V3.0</h1>
    
    <div id="status" class="status-bar">雲端數據讀取中...</div>

    <div style="text-align: right;">
        <label>切換檔期：</label>
        <select id="session-selector" onchange="switchSession()"></select>
    </div>

    <div class="session-info" id="session-detail">
        <strong>載入中...</strong>
    </div>

    <h2>🎯 今日出獎預測</h2>
    <div class="prediction-grid" id="prediction-results"></div>

    <div class="data-section">
        <div>
            <h2>📊 歷史數據追蹤</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>日期</th><th>時間</th><th>檔期</th></tr>
                    </thead>
                    <tbody id="data-table"></tbody>
                </table>
            </div>
        </div>

        <div class="chart-container">
            <h2>📈 出獎時間趨勢圖</h2>
            <canvas id="trendChart"></canvas>
        </div>
    </div>

    <p style="text-align: center; font-size: 0.8em; color: #999; margin-top: 30px;">
        * 數據源自 Google Sheets。本系統僅供邏輯參考，不代表官方立場。
    </p>
</div>

<script>
    // --- 這裡放入你的 CSV 網址 ---
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS78ynlSp6RiZrbuy2xrepY_o8okgD2XygL6MqXTxpdY1crYWb4YemjrEdMUDfapv11FU0oiPaNWSKB/pub?output=csv'; 

    // 當前活動固定資訊 (未來可在程式碼中新增)
    const sessionMeta = {
        "春日禮": {
            name: "【春日禮❤️可抽5次】麥當勞、必勝客、City Cafe等多重驚喜送給你",
            start: "2026-03-04 16:00:00",
            end: "2026-03-31 23:59:59",
            link: "https://tw.yahoo.com/member/item/266443",
            history: "https://tw.yahoo.com/member/luckyDrawHistory/93206"
        }
        // 未來在此新增新檔期資訊...
    };

    let fullData = [];
    let currentSession = "春日禮";
    let trendChart = null;

    async function init() {
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            fullData = rows.map(row => {
                const cols = row.split(',');
                return {
                    session: cols[0]?.trim() || "未命名",
                    date: cols[1]?.trim(),
                    time: parseInt(cols[2]),
                    update: cols[3]?.trim() || "無紀錄"
                };
            }).filter(d => !isNaN(d.time));

            // 更新選擇器
            const sessions = [...new Set(fullData.map(d => d.session))];
            const selector = document.getElementById('session-selector');
            selector.innerHTML = sessions.map(s => `<option value="${s}" ${s === currentSession ? 'selected' : ''}>${s}</option>`).join('');

            updateDashboard();
        } catch (e) {
            document.getElementById('status').innerText = "數據抓取失敗，請檢查 CSV 網址。";
        }
    }

    function updateDashboard() {
        const filtered = fullData.filter(d => d.session === currentSession);
        if (filtered.length === 0) return;

        // 1. 更新最後更新時間 (抓取該檔期最後一筆資料的 update 欄位)
        const lastEntry = filtered[filtered.length - 1];
        document.getElementById('status').innerText = `最後雲端同步時間：${lastEntry.update}`;

        // 2. 更新活動資訊
        const meta = sessionMeta[currentSession] || { name: currentSession, start: "-", end: "-", link: "#", history: "#" };
        document.getElementById('session-detail').innerHTML = `
            <strong>活動名稱：</strong> ${meta.name}<br>
            <strong>起迄時間：</strong> ${meta.start} ~ ${meta.end}<br>
            <strong>快速連結：</strong> <a href="${meta.link}" target="_blank">抽獎網頁</a> | <a href="${meta.history}" target="_blank">得獎查詢</a>
        `;

        // 3. 渲染預測
        renderPredictions(filtered);

        // 4. 渲染表格 (倒序)
        const tbody = document.getElementById('data-table');
        tbody.innerHTML = filtered.slice().reverse().map(d => `
            <tr><td>${d.date}</td><td>${d.time} 點</td><td>${d.session}</td></tr>
        `).join('');

        // 5. 渲染圖表
        renderChart(filtered);
    }

    function renderPredictions(data) {
        const times = data.map(d => d.time);
        const last = times[times.length - 1];
        const prev = times[times.length - 2];
        const avg = Math.round(times.reduce((a,b)=>a+b,0)/times.length);
        const trend = Math.max(10, Math.min(23, last + (last - prev)));

        const preds = [
            { t: trend, n: "趨勢推算", p: "45%", d: "依近期動能斜率" },
            { t: avg, n: "全期均值", p: "30%", d: "回歸活動平均點" },
            { t: 20, n: "高峰慣性", p: "25%", d: "參考近期熱門時段" }
        ];

        document.getElementById('prediction-results').innerHTML = preds.map(p => `
            <div class="card">
                <div style="font-size:0.8em; color:#888;">${p.n} (機率 ${p.p})</div>
                <div class="time-display">${p.t}:00</div>
                <div style="font-size:0.85em; color:#666;">${p.d}</div>
            </div>
        `).join('');
    }

    function renderChart(data) {
        const ctx = document.getElementById('trendChart').getContext('2d');
        if (trendChart) trendChart.destroy();
        
        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(d => d.date),
                datasets: [{
                    label: '出獎時間 (點)',
                    data: data.map(d => d.time),
                    borderColor: '#6f42c1',
                    backgroundColor: 'rgba(111, 66, 193, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                scales: { y: { min: 8, max: 24, ticks: { stepSize: 2 } } }
            }
        });
    }

    function switchSession() {
        currentSession = document.getElementById('session-selector').value;
        updateDashboard();
    }

    init();
</script>

</body>
</html>
