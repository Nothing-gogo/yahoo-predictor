<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇摩出獎雲端預測系統</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; color: #1c1e21; max-width: 900px; margin: 0 auto; padding: 20px; line-height: 1.6; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h1 { color: #4b0082; border-bottom: 2px solid #eee; padding-bottom: 10px; text-align: center; }
        .status-bar { background: #fff3cd; padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9em; text-align: center; border: 1px solid #ffeeba; }
        .prediction-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: #f8f9fa; border-top: 5px solid #6f42c1; padding: 20px; border-radius: 8px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin-top: 0; color: #6f42c1; }
        .time-display { font-size: 2.5em; font-weight: bold; color: #d63384; margin: 10px 0; }
        .prob-badge { background: #e83e8c; color: white; padding: 3px 10px; border-radius: 20px; font-size: 0.8em; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.95em; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #dee2e6; }
        th { background-color: #6f42c1; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .footer-note { font-size: 0.85em; color: #6c757d; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>奇摩出獎雲端預測系統</h1>
    
    <div class="status-bar" id="status">同步中... 請稍候</div>

    <h2>今日預測 (3/28)</h2>
    <div class="prediction-grid" id="prediction-results">
        </div>

    <hr>

    <h2>歷史數據 (數據源：Google Sheets)</h2>
    <div style="max-height: 400px; overflow-y: auto;">
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>出獎時間 (點)</th>
                    <th>狀態</th>
                </tr>
            </thead>
            <tbody id="data-table">
                </tbody>
        </table>
    </div>

    <div class="footer-note">
        * 數據每 5 分鐘從雲端同步一次。若剛更新 Google 表格請稍候再重新整理。<br>
        <strong>這只是數學推論，不保證 100% 準確。</strong>
    </div>
</div>

<script>
    // --- 請在此處貼上你的 Google Sheets CSV 網址 ---
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS78ynlSp6RiZrbuy2xrepY_o8okgD2XygL6MqXTxpdY1crYWb4YemjrEdMUDfapv11FU0oiPaNWSKB/pub?output=csv'; 

    let appData = [];

    async function fetchData() {
        try {
            const response = await fetch(CSV_URL);
            if (!response.ok) throw new Error('無法讀取雲端資料');
            const data = await response.text();
            
            // 解析 CSV (假設第一欄日期，第二欄時間)
            const rows = data.split('\n').slice(1); 
            appData = rows.map(row => {
                const columns = row.split(',');
                return { 
                    date: columns[0]?.trim(), 
                    time: parseInt(columns[1]) 
                };
            }).filter(item => !isNaN(item.time));

            document.getElementById('status').innerText = `同步成功！最後更新日期：${appData[appData.length-1].date}`;
            updateUI();
        } catch (error) {
            document.getElementById('status').innerHTML = `<span style="color:red">同步失敗：請檢查 CSV 網址是否正確並已發布。</span>`;
            console.error(error);
        }
    }

    function calculatePredictions() {
        if (appData.length < 3) return [];

        const times = appData.map(d => d.time);
        const last = times[times.length - 1];
        const prev = times[times.length - 2];

        // 邏輯 1: 短期波動趨勢
        let trend = last + (last - prev);
        trend = Math.max(10, Math.min(23, trend)); // 限制在 10-23 點

        // 邏輯 2: 全域均值回歸
        const avg = Math.round(times.reduce((a, b) => a + b, 0) / times.length);

        // 邏輯 3: 週末/週期慣性 (假設 3/28 週六)
        // 觀察歷史 3/7, 3/14, 3/21 均在 14-21 點
        let pattern = 19; 

        return [
            { time: trend, title: '趨勢波段', prob: '45%', desc: '依據前兩日升降幅推算' },
            { time: avg, title: '均值回歸', prob: '30%', desc: '依據全月平均出獎點' },
            { time: pattern, title: '週期慣性', prob: '25%', desc: '參考週六歷史出獎熱區' }
        ];
    }

    function updateUI() {
        // 更新表格
        const tableBody = document.getElementById('data-table');
        tableBody.innerHTML = appData.map(d => `
            <tr>
                <td>${d.date}</td>
                <td>${d.time} 點</td>
                <td>已確認</td>
            </tr>
        `).reverse().join(''); // 最新的排上面

        // 更新預測
        const predictions = calculatePredictions();
        const predContainer = document.getElementById('prediction-results');
        predContainer.innerHTML = predictions.map(p => `
            <div class="card">
                <span class="prob-badge">機率 ${p.prob}</span>
                <h3>${p.title}</h3>
                <div class="time-display">${p.time}:00</div>
                <small>${p.desc}</small>
            </div>
        `).join('');
    }

    // 初次載入
    fetchData();
    // 每 5 分鐘自動背景刷新
    setInterval(fetchData, 300000);
</script>

</body>
</html>
