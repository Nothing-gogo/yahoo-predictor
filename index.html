<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇摩出獎預測系統 V3.9 經典版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #6f42c1; --secondary: #e83e8c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', -apple-system, system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        h1 { color: var(--primary); margin: 0 0 15px 0; text-align: center; font-size: 1.8em; }
        
        /* 狀態列 (抓取 D 欄真實時間) */
        .status-bar { background: #fff3cd; padding: 10px; border-radius: 6px; text-align: center; font-size: 0.95em; margin-bottom: 20px; border: 1px solid #ffeeba; color: #856404; font-weight: bold; }

        /* 🎯 今日預測 - 經典大字卡片區 (完全回歸 V3.1 風格) */
        .prediction-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .card { background: #f8f9fa; border: 1px solid #eee; border-top: 5px solid var(--primary); padding: 20px; border-radius: 10px; text-align: center; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        
        /* 機率標籤 */
        .prob-badge { background: var(--secondary); color: white; padding: 3px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; text-transform: uppercase; }
        
        /* 邏輯標題 */
        .logic-title { margin: 10px 0 0 0; color: var(--primary); font-size: 1.1em; }
        
        /* 大字時間 (2.8em) */
        .time-display { font-size: 2.8em; font-weight: bold; color: var(--secondary); margin: 10px 0; line-height: 1; }
        
        /* 依據描述 */
        .logic-desc { font-size: 0.85em; color: #666; line-height: 1.4; }

        /* 活動資訊 (補上結束時間) */
        .session-info { background: #f1f0ff; padding: 15px; border-radius: 8px; border-left: 5px solid var(--primary); line-height: 1.6; margin-bottom: 20px; }
        .session-info a { color: var(--secondary); text-decoration: none; font-weight: bold; }

        /* 歷史數據表格 (最新日期排前面) */
        .table-wrapper { max-height: 180px; overflow-y: auto; border: 1px solid #eee; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { background: var(--primary); color: white; position: sticky; top: 0; padding: 10px; text-align: center; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #eee; }

        /* 圖表高度鎖定 (維持電腦版舒適度 40vh) */
        .chart-container { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px; height: 40vh; min-height: 300px; max-height: 400px; position: relative; }
        
        /* 檔期選擇器 */
        select { padding: 10px; border-radius: 5px; border: 1px solid var(--primary); background: #fff; width: auto; min-width: 250px; font-size: 1em; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>奇摩出獎預測分析 V3.9經典版</h1>
    <div id="status" class="status-bar">📝最後更新時間：正在抓取雲端數據...</div>

    <div style="text-align: right; margin-bottom: 15px; display: flex; justify-content: flex-end; align-items: center;">
        <label style="margin-right:10px; font-size: 0.9em;">切換活動檔期：</label>
        <select id="session-selector" onchange="switchSession()"></select>
    </div>

    <div class="session-info" id="session-detail">載入中...</div>

    <h2>🎯 今日預測</h2>
    <div class="prediction-grid" id="prediction-results"></div>

    <div class="history-section">
        <h2>📊 歷史追蹤 (最新日期排前面)</h2>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>日期</th><th>出獎時間</th><th>檔期</th></tr></thead>
                <tbody id="data-table"></tbody>
            </table>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="trendChart"></canvas>
    </div>
</div>

<script>
    // --- 這裡放入你的 pubhtml 網址 ---
    let rawUrl = '這裡改放你的pubhtml網址';
    // 自動將 pubhtml 網址轉為 output=csv 格式 (事實檢查：這能確保程式讀到原始數據而非 HTML 網頁)
    const CSV_URL = rawUrl.replace('/pubhtml', '/pub?output=csv');

    // 檔期元資料：請在此維護各檔期的詳細資訊 (Facts)
    const sessionMeta = {
        "春日禮": {
            name: "【春日禮❤️可抽5次】麥當勞、必勝客、City Cafe等多重驚喜",
            range: "3/4~3/31",
            startFull: "2026-03-04 16:00:00",
            endFull: "2026-03-31 23:59:59", // 補上結束時間
            link: "https://tw.yahoo.com/member/item/266443",
            history: "https://tw.yahoo.com/member/luckyDrawHistory/93206"
        }
        // 未來在此新增新檔期資訊...
    };

    let fullData = [];
    let currentSession = "";
    let trendChart = null;

    async function init() {
        try {
            // 防止瀏覽器快取，加上隨機參數
            const response = await fetch(CSV_URL + '&t=' + new Date().getTime());
            if (!response.ok) throw new Error('雲端連線失敗');
            const text = await response.text();
            
            // 解析 CSV 每一列並過濾空白列
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
            
            fullData = lines.slice(1).map(line => {
                const cols = line.split(',');
                return { 
                    session: cols[0]?.replace(/"/g, '').trim(), 
                    date: cols[1]?.replace(/"/g, '').trim(), 
                    time: parseInt(cols[2]),
                    sheetTime: cols[3]?.replace(/"/g, '').trim() // 抓取 D 欄 (索引 3) 的 =NOW()
                };
            }).filter(d => !isNaN(d.time));

            // --- 強化：找出所有資料中最後一個有效的 D 欄內容 ---
            let finalUpdate = "無數據";
            for (let i = fullData.length - 1; i >= 0; i--) {
                if (fullData[i].sheetTime && fullData[i].sheetTime.length > 5) {
                    finalUpdate = fullData[i].sheetTime;
                    break;
                }
            }
            document.getElementById('status').innerText = `📝最後更新時間：${finalUpdate}`;

            const sessions = [...new Set(fullData.map(d => d.session))];
            currentSession = sessions[sessions.length - 1]; // 預設最後一個檔期

            const selector = document.getElementById('session-selector');
            selector.innerHTML = sessions.map(s => {
                const range = sessionMeta[s]?.range || "";
                return `<option value="${s}" ${s === currentSession ? 'selected' : ''}>${s}${range}</option>`;
            }).join('');

            updateDashboard();
        } catch (e) {
            document.getElementById('status').innerText = "❌ 讀取失敗。請確認試算表已「發布為 CSV」。";
            console.error(e);
        }
    }

    function updateDashboard() {
        const filtered = fullData.filter(d => d.session === currentSession);
        if (filtered.length === 0) return;

        // 1. 更新活動資訊 (補上結束時間)
        const meta = sessionMeta[currentSession] || { name: currentSession, startFull: "-", endFull: "-", link: "#", history: "#" };
        document.getElementById('session-detail').innerHTML = `
            <strong>活動名稱：</strong> ${meta.name}<br>
            <strong>開始時間：</strong> ${meta.startFull}<br>
            <strong>結束時間：</strong> ${meta.endFull}<br>
            <strong>快速連結：</strong> <a href="${meta.link}" target="_blank">抽獎網頁</a> | <a href="${meta.history}" target="_blank">紀錄查詢</a>
        `;

        // 2. 🎯 今日預測 - 經典大字介面渲染 (UI 回歸 V3.1)
        const times = filtered.map(d => d.time);
        const last = times[times.length - 1];
        const prev = times[times.length - 2]?.time || last;
        const avg = Math.round(times.reduce((a,b)=>a+b.time,0)/times.length);
        const trend = Math.max(10, Math.min(23, last + (last - prev)));

        // 定義邏輯依據與機率 (Subjective Opinion for decision-making)
        const preds = [
            { t: trend, n: "趨勢波段", p: "45%", d: "依據前兩日升降幅推算" },
            { t: avg, n: "均值回歸", p: "30%", d: "依據全月平均出獎點" },
            { t: 20, n: "慣性推薦", p: "25%", d: "參考近期熱門高峰時段" }
        ];

        // 渲染大字卡片 (字體大、機率顯眼)
        document.getElementById('prediction-results').innerHTML = preds.map(p => `
            <div class="card">
                <span class="prob-badge">機率 ${p.p}</span>
                <h3 class="logic-title">${p.n}</h3>
                <div class="time-display">${p.t}:00</div>
                <div class="logic-desc">${p.d}</div>
            </div>
        `).join('');

        // 3. 表格渲染 (最新日期排前面)
        document.getElementById('data-table').innerHTML = filtered.slice().reverse().map(d => `
            <tr><td>${d.date}</td><td>${d.time} 點</td><td>${d.session}</td></tr>
        `).join('');

        // 4. 圖表渲染 (維持鎖定 CSS 高度的穩定性 40vh)
        renderChart(filtered);
    }

    function renderChart(data) {
        const ctx = document.getElementById('trendChart').getContext('2d');
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(d => d.date),
                datasets: [{
                    label: '點數',
                    data: data.map(d => d.time),
                    borderColor: '#6f42c1',
                    borderWidth: 2,
                    tension: 0.2,
                    fill: false,
                    pointRadius: 4,
                    pointBackgroundColor: '#e83e8c'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false, // 關鍵：讓它乖乖聽 CSS 容器高度的話
                scales: { 
                    y: { min: 8, max: 24, ticks: { stepSize: 4 } },
                    x: { ticks: { maxRotation: 45, minRotation: 45, font: { size: 10 } } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function switchSession() {
        currentSession = document.getElementById('session-selector').value;
        updateDashboard();
    }

    init();
</script>
</body>
</html>
