<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇摩出獎預測系統 (穩定回歸版)</title>
    <style>
        :root { --primary: #6f42c1; --secondary: #e83e8c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background-color: var(--bg); color: #333; max-width: 800px; margin: 0 auto; padding: 15px; }
        .container { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2 { color: var(--primary); text-align: center; margin-bottom: 15px; }
        
        /* 頂部狀態與資訊 */
        .status-bar { background: #e7f3ff; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.85em; text-align: center; border: 1px solid #b3d7ff; color: #004085; }
        .session-info { background: #f1f0ff; border-left: 5px solid var(--primary); padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.85em; line-height: 1.6; }
        .session-info a { color: var(--secondary); text-decoration: none; font-weight: bold; }

        /* 預測卡片 - 保持簡潔 */
        .prediction-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 25px; }
        .card { background: #fff; border: 1px solid #eee; border-top: 4px solid var(--primary); padding: 15px; border-radius: 8px; text-align: center; }
        .card-label { font-size: 0.75em; color: #888; }
        .time-display { font-size: 1.8em; font-weight: bold; color: var(--secondary); margin: 5px 0; }

        /* 歷史表格 - 最新日期排最前 */
        .table-wrapper { border: 1px solid #eee; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th { background: var(--primary); color: white; padding: 10px; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #eee; }
        tr:nth-child(even) { background-color: #fafafa; }
        
        select { padding: 8px; border-radius: 5px; border: 1px solid var(--primary); background: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>奇摩出獎預測 V3.3</h1>
    
    <div id="status" class="status-bar">數據連線中...</div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <div class="session-label">當前檔期：</div>
        <select id="session-selector" onchange="switchSession()"></select>
    </div>

    <div class="session-info" id="session-detail">載入中...</div>

    <h2>🎯 預測分析</h2>
    <div class="prediction-grid" id="prediction-results"></div>

    <h2>📊 歷史數據追蹤</h2>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>出獎時間</th>
                </tr>
            </thead>
            <tbody id="data-table">
                </tbody>
        </table>
    </div>

    <p style="text-align: center; font-size: 0.75em; color: #999; margin-top: 20px;">
        * 本程式採用純淨代碼開發，確保手機瀏覽流暢不閃退。
    </p>
</div>

<script>
    // --- 這裡放入你的 CSV 網址 ---
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS78ynlSp6RiZrbuy2xrepY_o8okgD2XygL6MqXTxpdY1crYWb4YemjrEdMUDfapv11FU0oiPaNWSKB/pub?output=csv'; 

    const sessionMeta = {
        "春日禮": {
            name: "【春日禮❤️可抽5次】麥當勞、必勝客、City Cafe等多重驚喜",
            start: "2026-03-04",
            end: "2026-03-31",
            link: "https://tw.yahoo.com/member/item/266443",
            history: "https://tw.yahoo.com/member/luckyDrawHistory/93206"
        }
    };

    let fullData = [];
    let currentSession = "春日禮";

    // 取得當前時間字串
    function getSyncTime() {
        const now = new Date();
        return `${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
    }

    async function init() {
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            fullData = rows.map(row => {
                const cols = row.split(',');
                return {
                    session: cols[0]?.trim() || "未命名",
                    date: cols[1]?.trim(),
                    time: parseInt(cols[2])
                };
            }).filter(d => !isNaN(d.time));

            // 更新選擇器
            const sessions = [...new Set(fullData.map(d => d.session))];
            const selector = document.getElementById('session-selector');
            selector.innerHTML = sessions.map(s => `<option value="${s}" ${s === currentSession ? 'selected' : ''}>${s}</option>`).join('');

            updateDashboard();
        } catch (e) {
            document.getElementById('status').innerText = "連線失敗，請確認 Google 表格發布狀態。";
        }
    }

    function updateDashboard() {
        const filtered = fullData.filter(d => d.session === currentSession);
        if (filtered.length === 0) return;

        // 更新狀態
        document.getElementById('status').innerText = `✅ 雲端同步成功 | 時間：${getSyncTime()}`;

        // 更新檔期詳細資訊
        const meta = sessionMeta[currentSession] || { name: currentSession, start: "-", end: "-", link: "#", history: "#" };
        document.getElementById('session-detail').innerHTML = `
            <strong>活動：</strong> ${meta.name}<br>
            <strong>日期：</strong> ${meta.start} ~ ${meta.end}<br>
            <strong>連結：</strong> <a href="${meta.link}" target="_blank">抽獎網頁</a> | <a href="${meta.history}" target="_blank">得獎查詢</a>
        `;

        // 渲染預測 (邏輯保持：趨勢、均值、慣性)
        const times = filtered.map(d => d.time);
        const last = times[times.length - 1];
        const prev = times[times.length - 2] || last;
        const avg = Math.round(times.reduce((a,b)=>a+b,0)/times.length);
        const trend = Math.max(10, Math.min(23, last + (last - prev)));

        const preds = [
            { t: trend, n: "趨勢推算", p: "45%" },
            { t: avg, n: "全期均值", p: "30%" },
            { t: 20, n: "高峰慣性", p: "25%" }
        ];

        document.getElementById('prediction-results').innerHTML = preds.map(p => `
            <div class="card">
                <div class="card-label">${p.n} (${p.p})</div>
                <div class="time-display">${p.t}:00</div>
            </div>
        `).join('');

        // 渲染表格 (最新日期排最前)
        const tbody = document.getElementById('data-table');
        tbody.innerHTML = filtered.slice().reverse().map(d => `
            <tr>
                <td>${d.date}</td>
                <td>${d.time} 點</td>
            </tr>
        `).join('');
    }

    function switchSession() {
        currentSession = document.getElementById('session-selector').value;
        updateDashboard();
    }

    // 初始化
    init();
    // 每 5 分鐘自動刷新一次
    setInterval(init, 300000);
</script>

</body>
</html>
