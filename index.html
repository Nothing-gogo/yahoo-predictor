<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇摩出獎預測系統 V3.5</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #6f42c1; --secondary: #e83e8c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h1 { color: var(--primary); margin: 0 0 15px 0; text-align: center; font-size: 1.8em; }
        .status-bar { background: #e7f3ff; padding: 8px; border-radius: 5px; text-align: center; font-size: 0.85em; margin-bottom: 15px; border: 1px solid #b3d7ff; color: #004085; }

        /* 檔期與預測區 */
        .top-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 15px; margin-bottom: 20px; }
        .session-box { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 5px solid var(--primary); }
        .prediction-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { background: #fff; border: 1px solid #eee; border-top: 4px solid var(--secondary); padding: 10px; text-align: center; border-radius: 6px; }
        .time-label { font-size: 0.75em; color: #777; }
        .time-display { font-size: 1.6em; font-weight: bold; color: var(--secondary); }

        /* 表格區 (限高) */
        .table-wrapper { max-height: 180px; overflow-y: auto; border: 1px solid #eee; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { background: var(--primary); color: white; position: sticky; top: 0; padding: 8px; }
        td { padding: 6px; text-align: center; border-bottom: 1px solid #eee; }

        /* 圖表區：高度鎖定螢幕 40% */
        .chart-container { 
            background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px; 
            height: 40vh; min-height: 300px; max-height: 400px; position: relative; 
        }
        
        select { width: 100%; padding: 8px; margin-top: 10px; border-radius: 4px; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>奇摩出獎預測分析 V3.5</h1>
    <div id="status" class="status-bar">正在讀取表單最後修改日期...</div>

    <div class="top-grid">
        <div class="session-box">
            <label><strong>切換活動檔期：</strong></label>
            <select id="session-selector" onchange="switchSession()"></select>
            <div id="session-detail" style="margin-top:10px; font-size:0.8em; color:#555;"></div>
        </div>
        <div class="prediction-grid" id="prediction-results"></div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead><tr><th>日期</th><th>出獎時間</th><th>檔期</th></tr></thead>
            <tbody id="data-table"></tbody>
        </table>
    </div>

    <div class="chart-container">
        <canvas id="trendChart"></canvas>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS78ynlSp6RiZrbuy2xrepY_o8okgD2XygL6MqXTxpdY1crYWb4YemjrEdMUDfapv11FU0oiPaNWSKB/pub?output=csv'; 

    const sessionMeta = {
        "春日禮": {
            name: "【春日禮❤️可抽5次】麥當勞、必勝客等多重驚喜",
            link: "https://tw.yahoo.com/member/item/266443",
            history: "https://tw.yahoo.com/member/luckyDrawHistory/93206"
        }
    };

    let fullData = [];
    let currentSession = "";
    let trendChart = null;

    async function init() {
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            fullData = rows.map(row => {
                const cols = row.split(',');
                return { 
                    session: cols[0]?.trim(), 
                    date: cols[1]?.trim(), 
                    time: parseInt(cols[2]),
                    sheetTime: cols[4]?.trim() // 讀取 D 欄的 =NOW()
                };
            }).filter(d => !isNaN(d.time));

            // 初始化切換選單
            const sessions = [...new Set(fullData.map(d => d.session))];
            currentSession = sessions[sessions.length - 1]; // 預設最後一個檔期
            const selector = document.getElementById('session-selector');
            selector.innerHTML = sessions.map(s => `<option value="${s}" ${s === currentSession ? 'selected' : ''}>${s}</option>`).join('');

            updateDashboard();
        } catch (e) {
            document.getElementById('status').innerText = "連線失敗，請檢查 CSV 發布狀態。";
        }
    }

    function updateDashboard() {
        const filtered = fullData.filter(d => d.session === currentSession);
        if (filtered.length === 0) return;

        // 1. 抓取表單 D 欄提供的真實修改時間 (取最後一筆)
        const lastModTime = fullData[fullData.length - 1].sheetTime || "無數據";
        document.getElementById('status').innerText = `📅 表單最後編輯時間：${lastModTime}`;

        // 2. 更新檔期資訊
        const meta = sessionMeta[currentSession] || { name: currentSession, link: "#", history: "#" };
        document.getElementById('session-detail').innerHTML = `
            <strong>活動：</strong> ${meta.name}<br>
            <a href="${meta.link}" target="_blank">抽獎頁</a> | <a href="${meta.history}" target="_blank">中獎查詢</a>
        `;

        // 3. 預測計算
        const last = filtered[filtered.length - 1].time;
        const prev = filtered[filtered.length - 2]?.time || last;
        const avg = Math.round(filtered.reduce((a,b)=>a+b.time,0)/filtered.length);
        const trend = Math.max(10, Math.min(23, last + (last - prev)));

        document.getElementById('prediction-results').innerHTML = `
            <div class="card"><div class="time-label">趨勢</div><div class="time-display">${trend}:00</div></div>
            <div class="card"><div class="time-label">平均</div><div class="time-display">${avg}:00</div></div>
            <div class="card"><div class="time-label">慣性</div><div class="time-display">20:00</div></div>
        `;

        // 4. 表格渲染 (最新排前面)
        document.getElementById('data-table').innerHTML = filtered.slice().reverse().map(d => `
            <tr><td>${d.date}</td><td>${d.time} 點</td><td>${d.session}</td></tr>
        `).join('');

        // 5. 圖表渲染
        renderChart(filtered);
    }

    function renderChart(data) {
        const ctx = document.getElementById('trendChart').getContext('2d');
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(d => d.date),
                datasets: [{
                    label: '出獎時間',
                    data: data.map(d => d.time),
                    borderColor: '#6f42c1',
                    borderWidth: 2,
                    tension: 0.2,
                    fill: false,
                    pointRadius: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { min: 8, max: 24, ticks: { stepSize: 4 } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function switchSession() {
        currentSession = document.getElementById('session-selector').value;
        updateDashboard();
    }

    init();
</script>
</body>
</html>
