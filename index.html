<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇摩出獎預測系統 V3.4 (電腦優化版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #6f42c1; --secondary: #e83e8c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        h1 { color: var(--primary); margin-top: 0; text-align: center; }
        .status-bar { background: #e7f3ff; padding: 8px; border-radius: 5px; text-align: center; font-size: 0.85em; margin-bottom: 15px; border: 1px solid #b3d7ff; }

        /* 上方資訊與預測區 */
        .top-section { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 20px; }
        .info-panel { background: #f8f9fa; border-left: 5px solid var(--primary); padding: 15px; border-radius: 5px; font-size: 0.9em; }
        .prediction-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { background: #fff; border: 1px solid #eee; border-top: 4px solid var(--secondary); padding: 10px; text-align: center; border-radius: 5px; }
        .time-display { font-size: 1.8em; font-weight: bold; color: var(--secondary); }

        /* 中間數據表格 (限高) */
        .table-wrapper { max-height: 200px; overflow-y: auto; border: 1px solid #eee; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { background: var(--primary); color: white; position: sticky; top: 0; padding: 8px; }
        td { padding: 6px; text-align: center; border-bottom: 1px solid #eee; }

        /* 下方圖表區：鎖定高度為螢幕高度的 40%，且不超過 400px */
        .chart-section {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            height: 40vh; /* 關鍵：鎖定高度為視窗的 40% */
            min-height: 300px;
            max-height: 400px;
            position: relative;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>奇摩出獎預測分析系統</h1>
    <div id="status" class="status-bar">正在從雲端同步最新數據...</div>

    <div class="top-section">
        <div class="info-panel" id="session-detail">
            </div>
        <div class="prediction-grid" id="prediction-results">
            </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead><tr><th>日期</th><th>出獎時間</th><th>檔期</th></tr></thead>
            <tbody id="data-table"></tbody>
        </table>
    </div>

    <div class="chart-section">
        <canvas id="trendChart"></canvas>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS78ynlSp6RiZrbuy2xrepY_o8okgD2XygL6MqXTxpdY1crYWb4YemjrEdMUDfapv11FU0oiPaNWSKB/pub?output=csv'; 

    const sessionMeta = {
        "春日禮": {
            name: "【春日禮❤️可抽5次】麥當勞、必勝客等多重驚喜",
            link: "https://tw.yahoo.com/member/item/266443",
            history: "https://tw.yahoo.com/member/luckyDrawHistory/93206"
        }
    };

    let fullData = [];
    let trendChart = null;

    async function init() {
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            fullData = rows.map(row => {
                const cols = row.split(',');
                return { session: cols[0]?.trim(), date: cols[1]?.trim(), time: parseInt(cols[2]) };
            }).filter(d => !isNaN(d.time));

            renderDashboard();
        } catch (e) {
            document.getElementById('status').innerText = "連線失敗，請檢查 CSV 是否正確發布。";
        }
    }

    function renderDashboard() {
        const now = new Date();
        document.getElementById('status').innerText = `✅ 同步成功：${now.toLocaleTimeString()}`;

        // 預設抓取最後一筆資料的檔期
        const currentSessName = fullData[fullData.length - 1].session;
        const meta = sessionMeta[currentSessName] || { name: currentSessName, link: "#", history: "#" };
        
        document.getElementById('session-detail').innerHTML = `
            <strong>${meta.name}</strong><br>
            <a href="${meta.link}" target="_blank">抽獎網頁</a> | <a href="${meta.history}" target="_blank">紀錄查詢</a>
        `;

        // 預測計算
        const last = fullData[fullData.length - 1].time;
        const prev = fullData[fullData.length - 2]?.time || last;
        const avg = Math.round(fullData.reduce((a,b)=>a+b.time,0)/fullData.length);
        const trend = Math.max(10, Math.min(23, last + (last - prev)));

        document.getElementById('prediction-results').innerHTML = `
            <div class="card"><small>趨勢</small><div class="time-display">${trend}:00</div></div>
            <div class="card"><small>平均</small><div class="time-display">${avg}:00</div></div>
            <div class="card"><small>慣性</small><div class="time-display">20:00</div></div>
        `;

        // 表格渲染
        document.getElementById('data-table').innerHTML = fullData.slice().reverse().map(d => `
            <tr><td>${d.date}</td><td>${d.time} 點</td><td>${d.session}</td></tr>
        `).join('');

        // 圖表渲染 (使用精簡配置)
        const ctx = document.getElementById('trendChart').getContext('2d');
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: fullData.map(d => d.date),
                datasets: [{
                    label: '出獎點',
                    data: fullData.map(d => d.time),
                    borderColor: '#6f42c1',
                    tension: 0.3,
                    fill: false,
                    pointRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false, // 讓它乖乖聽 CSS 容器高度的話
                scales: {
                    y: { min: 8, max: 24, ticks: { stepSize: 4 } },
                    x: { ticks: { maxTicksLimit: 15 } }
                }
            }
        });
    }

    init();
</script>
</body>
</html>
